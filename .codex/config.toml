# Codex CLI configuration for the Session 3 "Extending" demo.
#
# Enables the multi-agent / subagent system and registers the three review
# agents the demo's skills spawn. Each role's persona lives in its own file
# under agents/ (referenced via config_file).
#
# Drop this `.codex/` folder at the root of your workspace, or merge these
# blocks into your `~/.codex/config.toml` and copy the `agents/` folder beside
# whichever config.toml you're using.
#
# In Codex, subagents are invoked EXPLICITLY (unlike Claude Code's auto-routing).
# The critical-review and proofread skills spawn these by agent_role.

[features]
multi_agent = true

# ─── Subagent registry ──────────────────────────────────────────────

[agents.critical_friend]
description = "Stress-tests a draft argument by attacking its reasoning honestly — pushbacks, steel-manned counter-position, hidden assumptions, missing voices. Not a proofreader or fact-checker. Used by the critical-review skill."
config_file = "agents/critical-friend.toml"

[agents.fact_checker]
description = "Finds the verifiable factual and statistical claims in a draft and checks them against authoritative primary sources via web search. Returns per-claim verdicts. Used by the critical-review skill."
config_file = "agents/fact-checker.toml"

[agents.writing_editor]
description = "Improves drafts for clarity, grammar, structure, and tone without replacing the user's voice. Returns a structured edit list plus a cleaned version. Used by the proofread skill."
config_file = "agents/writing-editor.toml"

# ─── Base starter-kit agents ─────────────────────────────────────────

[agents.vault_librarian]
description = "Finds files in the user's notes, drafts, and saved material. Returns paths and one-line descriptions. Use to preserve the parent agent's context window."
config_file = "agents/vault-librarian.toml"

[agents.web_searcher]
description = "Goes out to the open web, reads relevant sources, returns a sourced answer with inline citations. Use when web information is required — addresses the query directly, with citations the parent/user can follow to go deeper."
config_file = "agents/web-searcher.toml"

[agents.project_planner]
description = "Decomposes a goal into milestones, tasks, dependencies, and honest estimates. Output pastes cleanly into Things, Notion, Linear."
config_file = "agents/project-planner.toml"

# ─── Queens Law additions ────────────────────────────────────────────

[agents.citation_checker]
description = "Checks legal citations against the Canadian Guide to Uniform Legal Citation (the McGill Guide) — case/neutral citations, paragraph pinpoints, statute references, ibid/supra consistency. Returns a per-citation verdict with the corrected McGill form. Used by the check-citations skill."
config_file = "agents/citation-checker.toml"
